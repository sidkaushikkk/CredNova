    <div class="form-container">
        <h2>Verify a Certificate</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Employers & third parties can instantly verify authenticity.</p>
        
        <form id="verifyForm">
            <div class="form-group">
                <label for="verifyCertId">Certificate ID</label>
                <input type="text" id="verifyCertId" class="form-control" required placeholder="Enter Certificate ID here...">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Verify Authenticity</button>
        </form>

        <div id="resultBox" class="result-box">
            <!-- Results injected here from JS -->
        </div>
